<!DOCTYPE html>
<html lang = "en">
  <head>
    <meta charset = "utf-8"/>
    <meta name = "viewport" content = "width=device-width, initial-scale=1" />
    <title>Restaurant Finder</title>

    <link
      href = "https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css"
      rel = "stylesheet"
    />

    <script src = "https://cdn.tailwindcss.com"></script>
    <script src = "https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
    <script src = "https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src = "https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src = "https://cdn.tailwindcss.com"></script>
    <script src = "https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src = "https://unpkg.com/feather-icons"></script>

    <style>
      body { margin: 0; padding: 0; overflow: hidden; }

      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

      .marker {
        background-image: url('https://logodix.com/logo/861558.png');
        background-size: cover;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        cursor: pointer;
        transition: transform 0.2s;
      }
      .marker:hover { transform: scale(1.2); }

      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        overflow: hidden;
      }

      #root, .map-wrapper {
        height: 100vh;
        width: 100vw;
      }
    </style>
  </head>

  <body>
    <div id = "root"></div>

    <script type = "text/babel">
      const { useState, useEffect, useRef } = React;

      // TEST DATA
      const TEST_RESTAURANTS = [
        { id: 1, name: "Restaurant 1", lat: 33.6461, lng: -117.8428, rating: 4.5, price: "$$", type: "Sit Down", image: "https://images.adsttc.com/media/images/5e4c/1025/6ee6/7e0b/9d00/0877/newsletter/feature_-_Main_hall_1.jpg?1582043123" },
      ];

      const MapView = ({ restaurants }) => {
        const mapContainerRef = useRef(null);
        const mapRef = useRef(null);
        const MAPBOX_TOKEN = "pk.eyJ1IjoiYWJpZ290IiwiYSI6ImNtbDNoZ2ZrejB0cnYzZnB4aGVkcDI4b2MifQ.s6M_2fu2bxR1Oz6XXC-PqA";
          
        useEffect(() => {
          mapboxgl.accessToken = MAPBOX_TOKEN;
          mapRef.current = new mapboxgl.Map({
            container: mapContainerRef.current,
            style: "mapbox://styles/mapbox/light-v11",
            center: [-117.8428, 33.6459],
            zoom: 14,
            pitch: 45,
          });

          mapRef.current.on('load', () => {
            mapRef.current.resize();
          });

          mapRef.current.addControl(new mapboxgl.NavigationControl(), 'bottom-right');

          return () => mapRef.current.remove();
        }, []);

        useEffect(() => {
          if (!mapRef.current) return;

          const markers = document.getElementsByClassName('marker');
          while(markers[0]) {
            markers[0].parentNode.removeChild(markers[0]);
          }

          restaurants.forEach(r => {
            const el = document.createElement('div');
            el.className = 'marker';

            const popupHTML = `
              <div class="p-0 max-w-xs font-sans">
                <div class="h-24 w-full bg-cover bg-center rounded-t-lg" style="background-image: url('${r.image}')"></div>
                <div class="p-3">
                  <h3 class="font-bold text-lg text-gray-800">${r.name}</h3>
                  <div class="flex items-center text-sm text-gray-600 mt-1">
                    <span class="text-yellow-500 font-bold mr-1">★ ${r.rating}</span>
                    <span>• ${r.price}</span>
                    <span class="mx-1">•</span>
                    <span>${r.type}</span>
                  </div>
                  <button class="mt-3 w-full bg-gray-900 text-white text-xs py-2 rounded hover:bg-black transition">View Details</button>
                </div>
              </div>
            `;

            new mapboxgl.Marker(el)
              .setLngLat([r.lng, r.lat])
              .setPopup(
                new mapboxgl.Popup({ offset: 25, closeButton: false })
                .setHTML(popupHTML)
              )
              .addTo(mapRef.current);
          });
        }, [restaurants]);

        return <div ref = {mapContainerRef} className = "w-full h-full" />;
      };

      const App = () => {
        const [queryFilters, setQueryFilters] = useState({
          query_string: "",
          dietary_restrictions: [],
          proximity_miles: 5,
          restaurant_style: "Casual",
          adventurous_sentiment: 3,
          group_size: 2,
          min_stars: 1,
          max_stars: 5,
          min_price_level: "$",
          max_price_level: "$$$$",
          opt_mealtime: ""
        });

        return (
          <div className = "map-wrapper relative">
            <MapView restaurants = {TEST_RESTAURANTS} />
          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
